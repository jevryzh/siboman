<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>逐梦 ERP</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/app-shell.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <div class="logo">O</div>
          <div class="name">Ozon 1688 ERP<small id="sidebarStore">未连接店铺</small></div>
        </div>

        <nav class="sidebar-nav" id="sidebarNav">
          <a class="nav-item" data-route="dashboard">
            <span class="icon">📊</span><span class="label">仪表盘</span>
          </a>

          <a class="nav-item" data-route="sourcing">
            <span class="icon">🎯</span><span class="label">选品</span>
          </a>
          <div class="nav-subitems" data-parent="sourcing">
            <a class="nav-subitem" data-route="sourcing/category">类目分析</a>
            <a class="nav-subitem" data-route="sourcing/bestsellers">榜单选品</a>
            <a class="nav-subitem" data-route="sourcing/single">单品找货</a>
            <a class="nav-subitem" data-route="sourcing/batch">批量采集</a>
          </div>

          <a class="nav-item" data-route="products">
            <span class="icon">📦</span><span class="label">商品</span>
            <span class="badge" id="navProductsBadge">…</span>
          </a>
          <div class="nav-subitems" data-parent="products">
            <a class="nav-subitem" data-route="products/list">商品列表</a>
            <a class="nav-subitem" data-route="products/upload">上架</a>
            <a class="nav-subitem" data-route="products/stock">同步库存</a>
            <a class="nav-subitem" data-route="products/images">AI 商品套图</a>
          </div>

          <a class="nav-item" data-route="orders">
            <span class="icon">🧾</span><span class="label">订单</span>
            <span class="badge" id="navOrdersBadge">…</span>
          </a>
          <div class="nav-subitems" data-parent="orders">
            <a class="nav-subitem" data-route="orders/list">订单列表</a>
          </div>

          <a class="nav-item" data-route="tools">
            <span class="icon">🛠️</span><span class="label">工具</span>
          </a>
          <div class="nav-subitems" data-parent="tools">
            <a class="nav-subitem" data-route="tools/browser">1688 浏览器</a>
            <a class="nav-subitem" data-route="tools/history">历史与下载</a>
            <a class="nav-subitem" data-route="tools/logs">运行日志</a>
          </div>
        </nav>

        <div class="sidebar-footer">
          <div class="who">
            <div id="sidebarUser">未登录</div>
            <small id="sidebarRole"></small>
          </div>
          <button id="logoutBtn" type="button">退出</button>
        </div>
      </aside>

      <main class="main">
        <div class="topbar">
          <h1 id="pageTitle">仪表盘</h1>
          <span class="crumb" id="pageCrumb"></span>
          <div class="actions" id="pageActions"></div>
        </div>
        <div class="content" id="content">
          <div class="empty">加载中…</div>
        </div>
      </main>
    </div>

    <div class="toast" id="toast"></div>
    <script src="/app.js"></script>
  </body>
</html>
