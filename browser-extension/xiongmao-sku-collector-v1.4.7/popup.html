<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>数据采集器</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <header class="header">
        <div>
          <h1>熊猫 Ozon 数据采集器 <span class="version" id="versionBadge">v?</span></h1>
          <p id="pageHint">当前页面数据</p>
        </div>
        <span class="badge" id="countBadge">0 条</span>
      </header>

      <section class="options" aria-label="采集选项">
        <label class="check">
          <input type="checkbox" id="autoScroll" checked>
          <span>自动向下采集当前列表</span>
        </label>
        <label class="check">
          <input type="checkbox" id="scanHorizontal" checked>
          <span>同时读取右侧列</span>
        </label>
        <label class="check">
          <input type="checkbox" id="imageFormula" checked>
          <span>照片列用 =IMAGE() 公式（WPS/Excel 直接显示图）</span>
        </label>
      </section>

      <button class="primary" id="collectBtn" type="button">采集当前页</button>

      <section class="actions" aria-label="导出操作">
        <button id="copyTencentBtn" type="button" disabled>复制到腾讯文档（带图）</button>
        <button id="downloadCsvBtn" type="button" disabled>下载 CSV（WPS/Excel 出图）</button>
        <button id="copyCsvBtn" type="button" disabled>复制 CSV</button>
        <button id="downloadHtmlBtn" type="button" disabled>下载 HTML</button>
        <button id="downloadJsonBtn" type="button" disabled>下载 JSON</button>
      </section>

      <p class="status" id="status">打开 Ozon Seller "来自我的仓库的订单" 页面后点击采集。<br>点"复制到腾讯文档" → 切到腾讯文档 → Ctrl+V，图会跟着进。</p>

      <section class="preview" aria-label="数据预览">
        <div class="preview-head">
          <strong>预览</strong>
          <span id="columnBadge">0 列</span>
        </div>
        <pre id="previewText">还没有采集数据</pre>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
